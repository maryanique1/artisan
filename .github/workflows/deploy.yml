name: Deploy to Hostinger

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            cd ${{ secrets.DEPLOY_PATH }}

            # Pull latest code
            git pull origin main

            # Install/update PHP dependencies
            composer install --no-dev --optimize-autoloader --no-interaction

            # Forcer BROADCAST_CONNECTION=log (reverb/pusher supprimés)
            sed -i 's/BROADCAST_CONNECTION=.*/BROADCAST_CONNECTION=log/' .env

            # Vider tous les caches avant de recréer (évite les 500 après suppression de classes)
            php artisan optimize:clear

            # Laravel optimizations
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            [ -L public/storage ] || ln -s /home/u942487893/fegartisan/storage/app/public public/storage

            echo "Deployment successful!"
